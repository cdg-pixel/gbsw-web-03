<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>홀수/짝수</title>
    </head>
    <body>
        <input id="input_number" type="number" />
        <button id="btn" type="button">확인</button>
        <div id="print"></div>
    </body>
</html>
<script>
    // 1. 버튼 클릭 이벤트 등록
    document.getElementById("btn").onclick = function () {
        // 2. input 내 value 조회
        let score = document.getElementById("input_number").value;
        
        let result = null;

        if (score > 100 || score < 0) {
            result = "유효하지 않은 값입니다.";
        } else{
            switch (Math.floor(score / 10)) {
                case 10:
                case 9:
                    result = "A";
                    break;
                case 8:
                    result = "B";
                    break;
                case 7:
                    result = "C";
                    break;
                case 6:
                    result = "D";
                    break;
                default:
                    result = "F";
                    break;
            }
        }
        // 4. div#print에 결과값 반영
        document.getElementById("print").textContent = result;
        alert(result);
    };
</script>
